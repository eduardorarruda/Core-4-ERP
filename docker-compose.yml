services:
  backend:
    build: ./core4erp
    ports:
      - "8080:8080"
    environment:
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      SECRET_KEY: ${SECRET_KEY}
      TOKEN_EXPIRATION: ${TOKEN_EXPIRATION:-604800000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    networks:
      - app-network
    restart: unless-stopped

  frontend:
    build: ./front-end
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge
