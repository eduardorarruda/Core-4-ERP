spring.application.name=core4erp
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.ignore-migration-patterns=*:missing
spring.flyway.out-of-order=true


# Estatisticas Hibernate (desabilitado em producao; ativar via env em staging para detectar N+1)
spring.jpa.properties.hibernate.generate_statistics=${HIBERNATE_STATS_ENABLED:false}

server.port=${PORT:8080}

# HikariCP — limite configurável via DB_POOL_SIZE (padrão 3 para plano gratuito)
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:3}
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.initialization-fail-timeout=120000

# Jackson — serializar datas como ISO-8601 string (evita arrays e problemas de parse no frontend)
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# JWT
jwt.secret=${SECRET_KEY}
jwt.expiration=${TOKEN_EXPIRATION:604800000}

# Swagger / OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.persist-authorization=true

# CORS — origens permitidas (separadas por vírgula); substituído pelo CorsConfig bean
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# Spring AI — OpenAI
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.options.model=${OPENAI_MODEL:gpt-4o-mini}
spring.ai.openai.chat.options.temperature=0.1
# Teto de tokens da resposta — controle de custo. Subido de 1024 para evitar truncar
# respostas com tabelas/listas longas (ver tratamento de finishReason=length no ChatService).
spring.ai.openai.chat.options.max-tokens=2048
# Inclui o uso de tokens (Usage) também no modo streaming. Sem isto a OpenAI não envia
# usage em .stream(), e perderíamos o log [CHAT-USAGE] e as métricas/painel de custo.
spring.ai.openai.chat.options.stream-usage=true
# Resiliência: tentativas em falhas transitórias (não repete em erros 4xx do cliente)
spring.ai.retry.max-attempts=2
spring.ai.retry.on-client-errors=false
# Propaga ThreadLocals (SecurityContext) para as threads do Reactor durante o streaming,
# garantindo que as tools enxerguem o usuário/tenant correto. Ver ChatAiConfig.
spring.reactor.context-propagation=auto

# Chat IA
chat.relatorios.dir=${java.io.tmpdir}/core4erp-relatorios
chat.relatorios.ttl-minutes=60
# Nº máximo de mensagens do histórico carregadas do banco por conversa
chat.historico.max-mensagens=20

# Chat — anexos (planilhas/OFX). max-chars limita o conteúdo enviado ao LLM (custo de tokens);
# acima disso é caso de delegar ao n8n. n8n.webhook-url vazio = processamento em processo (MVP).
chat.anexo.max-chars=3000
chat.n8n.webhook-url=${N8N_WEBHOOK_URL:}

# Upload de arquivos (anexo do chat e conciliação OFX) — default do Boot é 1MB, pouco p/ planilhas.
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

# RAG — Qdrant (banco vetorial) + embeddings OpenAI. O backend conecta no Qdrant interno via gRPC (6334).
# initialize-schema cria a coleção no boot (Qdrant precisa estar de pé). Isolamento por empresa é
# garantido por filtro de metadado (empresaId) no retrieval — ver RagService/ChatService.
spring.ai.vectorstore.qdrant.host=${QDRANT_HOST:qdrant}
spring.ai.vectorstore.qdrant.port=${QDRANT_PORT:6334}
spring.ai.vectorstore.qdrant.collection-name=${QDRANT_COLLECTION:core4erp_rag}
spring.ai.vectorstore.qdrant.initialize-schema=true
spring.ai.vectorstore.qdrant.use-tls=false
spring.ai.openai.embedding.options.model=${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
# ATENÇÃO: a dimensão do embedding (1536 p/ text-embedding-3-small) fica fixada na coleção criada no
# boot. Trocar OPENAI_EMBEDDING_MODEL por um modelo de outra dimensão exige recriar a coleção no Qdrant.
# Retrieval (ajustáveis): top-k = nº de trechos; similaridade-minima = corte de relevância (0..1).
rag.top-k=${RAG_TOP_K:4}
rag.similaridade-minima=${RAG_SIMILARIDADE_MINIMA:0.4}
rag.qdrant-rest-url=${RAG_QDRANT_REST_URL:http://${QDRANT_HOST:qdrant}:6333}

# E-mail (reset de senha)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.connectiontimeout=8000
spring.mail.properties.mail.smtp.timeout=8000
spring.mail.properties.mail.smtp.writetimeout=8000
app.mail.from=${MAIL_FROM:noreply@core4erp.com}
app.frontend.url=${CORS_ORIGINS:http://localhost:5173}

# Actuator / Prometheus
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when_authorized
management.endpoint.prometheus.enabled=true
management.prometheus.metrics.export.enabled=true
management.metrics.tags.application=core4erp
management.metrics.tags.environment=${APP_ENV:development}
management.httpexchanges.recording.enabled=true
management.metrics.distribution.percentiles-histogram.http.server.requests=true
