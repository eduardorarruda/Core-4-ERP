spring.application.name=core4erp
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.ignore-migration-patterns=*:missing
spring.flyway.out-of-order=true


# Estatisticas Hibernate (desabilitado em producao; ativar via env em staging para detectar N+1)
spring.jpa.properties.hibernate.generate_statistics=${HIBERNATE_STATS_ENABLED:false}

server.port=${PORT:8080}

# HikariCP — limite configurável via DB_POOL_SIZE (padrão 3 para plano gratuito)
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:3}
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.initialization-fail-timeout=120000

# JWT
jwt.secret=${SECRET_KEY}
jwt.expiration=${TOKEN_EXPIRATION:604800000}

# Swagger / OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.persist-authorization=true

# CORS — origens permitidas (separadas por vírgula); substituído pelo CorsConfig bean
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# Spring AI
spring.ai.google.genai.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.chat.options.model=gemini-2.0-flash
spring.ai.google.genai.chat.options.temperature=0.1

# Chat IA
chat.memory.max-messages=20
chat.relatorios.dir=${java.io.tmpdir}/core4erp-relatorios
chat.relatorios.ttl-minutes=60
chat.cache.ttl-hours=2
chat.cache.max-size=1000
chat.historico.max-mensagens=20

# E-mail (reset de senha)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.connectiontimeout=8000
spring.mail.properties.mail.smtp.timeout=8000
spring.mail.properties.mail.smtp.writetimeout=8000
app.mail.from=${MAIL_FROM:noreply@core4erp.com}
app.frontend.url=${CORS_ORIGINS:http://localhost:5173}

# Actuator / Prometheus
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when_authorized
management.endpoint.prometheus.enabled=true
management.prometheus.metrics.export.enabled=true
management.metrics.tags.application=core4erp
management.metrics.tags.environment=${APP_ENV:development}
management.httpexchanges.recording.enabled=true
management.metrics.distribution.percentiles-histogram.http.server.requests=true
