spring.application.name=core4erp
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.flyway.enabled=false

server.port=8080

# JWT
jwt.secret=${SECRET_KEY}
jwt.expiration=${TOKEN_EXPIRATION:604800000}

# Swagger / OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method

# CORS — origens permitidas (separadas por vírgula); substituído pelo CorsConfig bean
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}
