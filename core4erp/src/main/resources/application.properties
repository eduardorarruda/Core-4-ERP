spring.application.name=core4erp
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.ignore-migration-patterns=*:missing
spring.flyway.out-of-order=true

server.port=${PORT:8080}

# HikariCP — limita conexões para caber no plano gratuito do Aiven
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.initialization-fail-timeout=120000

# JWT
jwt.secret=${SECRET_KEY}
jwt.expiration=${TOKEN_EXPIRATION:604800000}

# Swagger / OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method

# CORS — origens permitidas (separadas por vírgula); substituído pelo CorsConfig bean
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# Spring AI
spring.ai.google.genai.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.chat.options.model=gemini-2.0-flash
spring.ai.google.genai.chat.options.temperature=0.1

# Chat IA
chat.memory.max-messages=20
chat.relatorios.dir=${java.io.tmpdir}/core4erp-relatorios
chat.relatorios.ttl-minutes=60
