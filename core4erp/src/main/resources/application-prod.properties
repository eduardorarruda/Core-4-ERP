# Configurações de produção — sobrepõem application.properties
# Ativar com: SPRING_PROFILES_ACTIVE=prod

# Flyway estrito em produção: sem migrações fora de ordem, sem ignorar ausentes
spring.flyway.out-of-order=false
spring.flyway.ignore-migration-patterns=

# Pool maior em produção (sobrescrever via DB_POOL_SIZE no environment)
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=2

# Logs mais concisos
management.endpoint.health.show-details=never
